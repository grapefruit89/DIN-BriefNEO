 position: fixed; left: 0; bottom: 0; right: 0; z-index: 10; padding: 8px 20px;

<section class="preview" style="position: relative; width: 210mm; box-sizing: border-box;">
 <nav style="position: absolute; top: 87mm; left: 4mm;"></nav>
 <nav style="position: absolute; top: 192mm; left: 4mm;"></nav>
 <!-- Adress Block -->
 <div class="address address-wrapper box" style="position: absolute; left: 25mm; top: 32mm; width: 80mm; z-index: 10; box-sizing: border-box;">
  <div contenteditable="true" placeholder="Name, Straße Nr., PLZ Ort" id="ruecksende" style="line-height: 9px; display: inline-block; font-size: 7pt; margin-bottom: 6pt;"></div>
  <br><div contenteditable="true" placeholder="Firma GmbH" style="display: inline-block;"></div>
  <br><div contenteditable="true" placeholder="Herrn Frau" style="display: inline-block;"></div>
  <br><div contenteditable="true" placeholder="Vor Nachname" style="display: inline-block;"></div>
  <br><div contenteditable="true" placeholder="Straße Haus Nr." style="display: inline-block;"></div>
  <br><div contenteditable="true" placeholder="PLZ Ort" style="display: inline-block;"></div>
 </div>
 <!-- AbsenderBlock -->
 <div class="sidebar-text" style="text-transform: capitalize; position: absolute; left: 150mm; top: 40mm; text-align: left;">
  <div contenteditable="true" placeholder="Name" id="Name" style="display: inline-block; font-weight: bold; margin-bottom: 6pt;"></div>
  <br><div contenteditable="true" placeholder="Straße" id="Straße" style="display: inline-block;"></div>
  <br><div contenteditable="true" placeholder="PLZ Ort" id="Ort" style="display: inline-block;"></div>
  <br><div contenteditable="true" placeholder="eMail" style="display: inline-block; text-transform: lowercase; margin-top: 6pt;"></div>
  <br><div contenteditable="true" placeholder="Nummer" style="display: inline-block;"></div>
  <br><div contenteditable="true" placeholder="Datum" id="Datum" style="display: inline-block; margin-top: 14pt;"></div>
 </div>
 <div class="body body-subject" style="position: absolute; left: 25mm; top: 90mm; right: 20mm;">
  <!-- Betreff -->
  <div contenteditable="true" placeholder="Betreff" id="Betreff" style="display: inline-block; font-weight: bold; margin-bottom: 10pt;"></div>
  <!-- Inhalt -->
  <div contenteditable="true" placeholder="Hier kommt dein Text rein!!!" id="Inhalt">Sehr geehrte Damen und Herren,<br/>
  <em>Kursiv STRG+I </em><br/>
  <b>Fett STRG+B </b><br/>
  <u>Unterstrichen STRG+U</u></div>

  <div contenteditable="true" placeholder="Dein Name" id="yourname" style="display: inline-block;"></div>

  <br><footer contenteditable="true" placeholder="• Dokument 3" style="margin-left: 5pt; display: inline-block;"></footer>
 </div>
