<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DIN 5008 Brief-Generator</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✉️</text></svg>" />
  <link rel="stylesheet" href="css/typography.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/din5008.css" />

  <!-- [ANTI-FOUC] Sync state restore before first paint -->
  <script>
    (function () {
      try {
        const raw = localStorage.getItem('claude_brief_state');
        if (!raw) return;
        const s = JSON.parse(raw);
        if (s?.config?.layout === 'form-a') document.documentElement.dataset.layout = 'form-a';
        else document.documentElement.dataset.layout = 'form-b';
      } catch (e) { /* silent */ }
    })();
  </script>
</head>
<body>

  <!-- Mobile Guard -->
  <div id="mobile-guard" aria-hidden="true">
    <div class="guard-box">
      <div class="guard-icon">💻</div>
      <h1>Desktop Only</h1>
      <p>Diese Anwendung benötigt einen Bildschirm ab 1024 px für die A4-Bearbeitung.</p>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       SIDEBAR – Settings & Actions
  ══════════════════════════════════════════════ -->
  <nav id="sidebar" class="no-print" role="navigation" aria-label="Einstellungen">

    <div class="sidebar-brand">
      <svg viewBox="0 0 24 24" aria-hidden="true" class="brand-icon">
        <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M16,11V13H8V11H16M16,15V17H8V15H16Z"/>
      </svg>
      <span class="brand-name">DIN 5008</span>
      <span class="brand-version">V1</span>
    </div>

    <div class="sidebar-scroll">

      <!-- DIN Variant -->
      <section class="ctrl-section">
        <div class="ctrl-group">
          <label class="ctrl-label">DIN-Variante</label>
          <div class="radio-group" role="radiogroup" aria-label="DIN-Variante">
            <label class="radio-opt">
              <input type="radio" name="layout" value="form-a" id="opt-form-a" />
              <span>Form A <small>32 mm</small></span>
            </label>
            <label class="radio-opt">
              <input type="radio" name="layout" value="form-b" id="opt-form-b" checked />
              <span>Form B <small>50 mm</small></span>
            </label>
          </div>
        </div>

        <!-- Formality -->
        <div class="ctrl-group">
          <label class="ctrl-label">Anrede-Typ</label>
          <div class="radio-group" role="radiogroup" aria-label="Anrede-Typ">
            <label class="radio-opt"><input type="radio" name="recipientType" value="none" checked /><span>Keine</span></label>
            <label class="radio-opt"><input type="radio" name="recipientType" value="female" /><span>Frau</span></label>
            <label class="radio-opt"><input type="radio" name="recipientType" value="male" /><span>Herr</span></label>
          </div>
        </div>

        <div class="ctrl-group">
          <label class="ctrl-label">Anrede-Stil</label>
          <div class="radio-group" role="radiogroup" aria-label="Anrede-Stil">
            <label class="radio-opt"><input type="radio" name="formality" value="formal" checked /><span>Formal</span></label>
            <label class="radio-opt"><input type="radio" name="formality" value="polite" /><span>Modern</span></label>
            <label class="radio-opt"><input type="radio" name="formality" value="casual" /><span>Locker</span></label>
          </div>
        </div>

        <!-- Date Format -->
        <div class="ctrl-group">
          <label class="ctrl-label">Datumsformat</label>
          <div class="radio-group" role="radiogroup" aria-label="Datumsformat">
            <label class="radio-opt"><input type="radio" name="dateFormat" value="de" checked /><span>DE <small id="lbl-date-de">16.03.2026</small></span></label>
            <label class="radio-opt"><input type="radio" name="dateFormat" value="long" /><span>Lang <small id="lbl-date-long">16. März</small></span></label>
            <label class="radio-opt"><input type="radio" name="dateFormat" value="iso" /><span>ISO <small id="lbl-date-iso">2026-03-16</small></span></label>
          </div>
        </div>

        <!-- Guides Toggle -->
        <div class="ctrl-group">
          <label class="ctrl-label toggle-label">
            <input type="checkbox" id="toggle-guides" />
            <span>Hilfslinien anzeigen</span>
          </label>
        </div>
      </section>
    </div><!-- /sidebar-scroll -->

    <!-- Toolbar Actions -->
    <div class="sidebar-footer no-print">
      <div class="footer-row">
        <button id="btn-export" class="btn-secondary" title="JSON-Backup speichern">💾 Export</button>
        <button id="btn-import" class="btn-secondary" title="JSON-Backup laden">📂 Import</button>
        <button id="btn-reset"  class="btn-danger"    title="Alles zurücksetzen">🗑 Reset</button>
      </div>
      <button id="btn-profile" class="btn-secondary full-width">👤 Absender-Profil</button>
      <button id="btn-print"   class="btn-primary  full-width">🖨 Drucken / PDF</button>
    </div>
    <input type="file" id="file-import" accept=".json" hidden aria-hidden="true" />
  </nav>

  <!-- ═══════════════════════════════════════════
       EDITOR TOOLBAR – floating text formatting
  ══════════════════════════════════════════════ -->
  <div id="editor-toolbar" class="no-print" role="toolbar" aria-label="Textformatierung">
    <button data-js="action:undo"  title="Rückgängig (Strg+Z)" class="tb-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
    <button data-js="action:redo"  title="Wiederherstellen (Strg+Y)" class="tb-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
    <div class="tb-sep"></div>
    <button data-cmd="bold"            title="Fett (Strg+B)"          class="tb-btn"><b>B</b></button>
    <button data-cmd="italic"          title="Kursiv (Strg+I)"        class="tb-btn"><i>I</i></button>
    <button data-cmd="underline"       title="Unterstrichen (Strg+U)" class="tb-btn"><u>U</u></button>
    <div class="tb-sep"></div>
    <button data-cmd="insertUnorderedList" title="Liste"               class="tb-btn">≡</button>
    <button data-cmd="insertOrderedList"   title="Nummerierung"        class="tb-btn">①</button>
    <div class="tb-sep"></div>
    <button data-cmd="removeFormat"    title="Format löschen"         class="tb-btn">✕</button>
  </div>

  <!-- ═══════════════════════════════════════════
       MAIN WORKSPACE
  ══════════════════════════════════════════════ -->
  <main id="workspace">
    <div id="paper-wrap">

      <!-- THE PAPER -->
      <article id="paper" aria-label="Briefbogen">

        <!-- DIN Marks (screen only) -->
        <div class="din-mark mark-fold-1" aria-hidden="true"></div>
        <div class="din-mark mark-punch"  aria-hidden="true"></div>
        <div class="din-mark mark-fold-2" aria-hidden="true"></div>

        <!-- ZONE A: SENDER HEADER (top-right) -->
        <div id="sender-block" aria-label="Absenderblock">
          <div id="f-sender-name"    contenteditable="true" data-field="senderName"    data-ph="Vor- und Nachname" class="ce-line"></div>
          <div id="f-sender-street"  contenteditable="true" data-field="senderStreet"  data-ph="Straße Hausnummer" class="ce-line"></div>
          <div id="f-sender-zip"     contenteditable="true" data-field="senderZipCity" data-ph="PLZ Ort"           class="ce-line"></div>
          <div id="f-sender-phone"   contenteditable="true" data-field="senderPhone"   data-ph="Telefon"           class="ce-line ce-small"></div>
          <div id="f-sender-email"   contenteditable="true" data-field="senderEmail"   data-ph="E-Mail"            class="ce-line ce-small"></div>
        </div>

        <!-- ZONE B: ADDRESS WINDOW (left column) -->
        <div id="address-zone" aria-label="Anschriftfeld">
          <!-- Return address (small underlined line) -->
          <div id="f-return"         contenteditable="true" data-field="returnAddress" data-ph="Rücksendeangabe" class="ce-line ce-return"></div>
          <!-- Special note (Einschreiben etc.) -->
          <div id="f-special"        contenteditable="true" data-field="specialNote"   data-ph="Einschreiben" class="ce-line ce-small"></div>
          <!-- Recipient block -->
          <div id="recipient-block" role="group" aria-label="Empfängeranschrift">
            <div id="f-rec-company"  contenteditable="true" data-field="recipientCompany" data-ph="Firma GmbH"      class="ce-line"></div>
            <div id="f-rec-salut"    contenteditable="true" data-field="recipientSalut"   data-ph="Herrn / Frau"    class="ce-line"></div>
            <div id="f-rec-name"     contenteditable="true" data-field="recipientName"    data-ph="Max Mustermann"  class="ce-line"></div>
            <div id="f-rec-street"   contenteditable="true" data-field="recipientStreet"  data-ph="Musterstraße 1"  class="ce-line"></div>
            <div id="f-rec-zip"      contenteditable="true" data-field="recipientZip"     data-ph="PLZ"             class="ce-line ce-inline-zip"></div>
            <div id="f-rec-city"     contenteditable="true" data-field="recipientCity"    data-ph="Musterstadt"     class="ce-line ce-inline-city"></div>
          </div>
        </div>

        <!-- ZONE C: DATE (top-right, below sender) -->
        <div id="f-date" contenteditable="true" data-field="date" data-ph="Datum" class="ce-line date-field" aria-label="Datum"></div>

        <!-- ZONE D: BODY TEXT -->
        <section id="text-zone" aria-label="Brieftext">
          <div id="f-subject"   contenteditable="true" data-field="subject"   data-ph="Betreff"               class="ce-line subject-line"></div>
          <div id="f-salut"     contenteditable="true" data-field="salutation" data-ph="Anrede,"              class="ce-line salut-line"></div>
          <div id="f-body"      contenteditable="true" data-field="body"      data-ph="Brieftext hier eingeben…" class="ce-body"></div>
          <div id="f-greeting"  contenteditable="true" data-field="greeting"  data-ph="Mit freundlichen Grüßen" class="ce-line greeting-line"></div>
          <div id="signature-gap" aria-hidden="true"></div>
          <div id="f-sig-name"  contenteditable="true" data-field="signatureName" data-ph="Name"             class="ce-line"></div>
        </section>

      </article><!-- /#paper -->
    </div><!-- /#paper-wrap -->
  </main>

  <!-- ═══════════════════════════════════════════
       DIALOGS
  ══════════════════════════════════════════════ -->

  <!-- Profile Dialog -->
  <dialog id="dialog-profile" class="no-print" aria-labelledby="profile-title">
    <button class="dialog-close" data-js="action:dialog-close" aria-label="Schließen">×</button>
    <h2 id="profile-title">👤 Absender-Profil</h2>
    <p class="dialog-sub">Wird automatisch in neue Briefe geladen.</p>
    <div class="form-grid">
      <label>Firma<input type="text" id="p-company" autocomplete="organization" data-profile="company" /></label>
      <label>Name<input type="text" id="p-name" autocomplete="name" data-profile="name" /></label>
      <label>Straße<input type="text" id="p-street" autocomplete="street-address" data-profile="street" /></label>
      <label>PLZ<input type="text" id="p-zip" autocomplete="postal-code" inputmode="numeric" data-profile="zip" /></label>
      <label>Stadt<input type="text" id="p-city" autocomplete="address-level2" data-profile="city" /></label>
      <label>Telefon<input type="tel" id="p-phone" autocomplete="tel" data-profile="phone" /></label>
      <label>E-Mail<input type="email" id="p-email" autocomplete="email" data-profile="email" /></label>
      <label class="label-full">IBAN
        <div class="iban-wrap">
          <div id="iban-ghost" aria-hidden="true"></div>
          <input type="text" id="p-iban" maxlength="34" autocomplete="off" spellcheck="false" data-profile="iban" placeholder="DE00 0000 0000 0000 0000 00" />
        </div>
      </label>
    </div>
    <div class="dialog-actions">
      <button class="btn-secondary" data-js="action:dialog-close">Abbrechen</button>
      <button class="btn-primary"   id="btn-profile-save">Übernehmen</button>
    </div>
  </dialog>

  <!-- Confirm Reset Dialog -->
  <dialog id="dialog-confirm" class="no-print dialog-sm" aria-labelledby="confirm-title">
    <div class="confirm-icon" aria-hidden="true">⚠️</div>
    <h2 id="confirm-title">Brief zurücksetzen?</h2>
    <p id="confirm-msg">Alle Inhalte werden gelöscht. Nicht rückgängig machbar.</p>
    <div class="dialog-actions">
      <button class="btn-secondary" id="btn-confirm-no">Abbrechen</button>
      <button class="btn-danger"    id="btn-confirm-yes">Zurücksetzen</button>
    </div>
  </dialog>

  <!-- Status bar -->
  <div id="statusbar" class="no-print" aria-live="polite">⏳ Init…</div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="assertive" class="no-print"></div>

  <!-- ES6 Module Entry Point -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
