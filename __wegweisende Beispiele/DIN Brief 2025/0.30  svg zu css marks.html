<style>
/* Grundreset */
* {
  margin: 0;
  padding: 0;
}

/* Schriftart & Layout */
html {
  font-family: 'Fira Sans', 'Myriad Pro', sans-serif;
  font-size: 10pt;
  line-height: 14pt;
}

/* Button für Speicher löschen */
.clear-storage-btn {
  display: none;
  position: fixed;
  left: 0;
  top: 0;
  right: 0;
  z-index: 10;
  padding: 8px 20px;
  font-size: 10pt;
  line-height: 14pt;
  text-align: center;
  background: rgba(0, 0, 0, 0.3);
  color: white;
  text-decoration: none;
}
.clear-storage-btn:hover {
  background: rgba(0, 0, 0, 0.5);
}
.clear-storage-btn:active {
  background: rgba(0, 0, 0, 0.7);
}
.clear-storage-btn.is-visible {
  display: block;
}

/* ContentEditable-Grundstil mit aktivem Design */
[contenteditable] {
  outline: none;
  cursor: text;
  border: 1px dashed rgba(0, 0, 0, 0.2);
  border-radius: .25rem;
  min-width: 2rem;
  min-height: 1.5rem;
}

/* Mouseover-Stil */
[contenteditable]:hover {
  border: 1px solid rgba(0, 0, 0, 0.2);
  border-radius: initial;
}

/* Aktiv (z. B. Fokus) */
[contenteditable]:focus {
  box-shadow: 0 2px 5px #007bff;
  border: 1px solid rgba(0, 0, 0, 0.0);
}

/* Placeholder anzeigen, wenn wirklich leer (auch bei nur <br>) */
[contenteditable]:empty::before,
[contenteditable]:not(:empty):only-child:is(br)::before {
  content: attr(placeholder);
  color: #ababab;
  pointer-events: none;
  display: block;
}

/* Formatierung des Platzhalter-Blocks */
[contenteditable]::before {
  white-space: pre-line;
}



/* Medienanpassungen */
@media screen {
  .baseline-8pt:focus {
    padding-top: 12.1pt;
    margin-bottom: -12.1pt;
  }

  body {
    background-color: rgba(0, 0, 0, 0.3);
  }



  .no-screen {
    display: none !important;
  }

  .preview {
    margin: 50px auto;
    background: white;
    height: 297mm;
    box-shadow: 0 5px 50px rgba(0, 0, 0, 0.3);
  }

  footer::before {
    content: "• ";
  }

  nav::before {
    content: "—";
  }
}

@media print {
  @page { size: A4; margin: 0; }

  [contenteditable] {
    caret-color: transparent;
  }


  [contenteditable]:empty::before {
    display: none !important;
  }

  .no-print {
    display: none !important;
  }

  .preview {
    /* Optional: Anpassungen fürs Drucken */
  }
}
</style>

 <!-- 1) Paste-Handler für reinen Text -->
  <script>
  "use strict";
  const editorEle = document.getElementById("Inhalt");
  if (editorEle) {
    editorEle.addEventListener("paste", async e => {
      e.preventDefault();
      let text = "";
      try {
        if (navigator.clipboard?.readText) {
          text = await navigator.clipboard.readText();
        } else if (e.clipboardData) {
          text = e.clipboardData.getData("text/plain");
        } else if (window.clipboardData) {
          text = window.clipboardData.getData("Text");
        }
      } catch (err) {
        console.error("Clipboard-Fehler:", err);
      }
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      range.deleteContents();
      const node = document.createTextNode(text);
      range.insertNode(node);
      range.setStartAfter(node);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    });
  }
  </script>

  <!-- 2) Dein GV-Modul: Draft, Title, Storage, Events -->
  <script>
  "use strict";
  ;(function() {
    const gv = window.gv = window.gv || {};
    const dataItems = [
      "address-overline","address","sidebar-text",
      "body-subject","body-text","attachments-bd"
    ];
    gv.createDateGerman = () =>
      new Intl.DateTimeFormat("de-DE", {
        day: "numeric", month: "long", year: "numeric"
      }).format(new Date());
    function truncate(str, maxLen, useWordBoundary = true) {
      if (str.length <= maxLen) return str;
      let s = str.slice(0, maxLen - 1);
      if (useWordBoundary) {
        const idx = s.lastIndexOf(" ");
        if (idx > 0) s = s.slice(0, idx);
      }
      return s;
    }
    gv.setTitleFromSubject = () => {
      const subj = document.getElementById("Betreff");
      if (!subj) return;
      document.title = 
        new Date().toISOString().slice(0,10) 
        + " " + truncate(subj.textContent, 60);
    };
    gv.updateAbsender = () => {
      const getText = id => document.getElementById(id)?.textContent || "";
      const [vor, nach] = getText("Name").split(" ");
      const initiale = vor?.[0]?.toUpperCase()+".";
      const fam = nach ? nach[0].toUpperCase()+nach.slice(1)+"," : "";
      const street = getText("Straße").replace(/Strasse/i,"Straße");
      const place  = getText("Ort").replace(/Sankt/i,"St.");
      const fertig = [initiale,fam,street,place].filter(Boolean).join(" ");
      document.getElementById("ruecksende").textContent = fertig;
      document.getElementById("yourname").textContent = getText("Name");
    };
    gv.getDraft =    () => JSON.parse(localStorage.getItem("draft")||"null");
    gv.saveDraft =   () => {
      const draft = {};
      dataItems.forEach(key => {
        const el = document.querySelector(`.${key}`);
        if (el) draft[key] = el.innerHTML;
      });
      localStorage.setItem("draft", JSON.stringify(draft));
    };
    gv.restoreDraft = () => {
      const d = gv.getDraft();
      if (!d) return false;
      dataItems.forEach(key => {
        const el = document.querySelector(`.${key}`);
        if (el && d[key]!=null) el.innerHTML = d[key];
      });
      return true;
    };
    gv.deleteDraft = () => localStorage.removeItem("draft");
    gv.updateStorageBtn = () => {
      document.querySelectorAll(".clear-storage-btn")
        .forEach(btn => btn.classList.toggle(
          "is-visible", gv.getDraft()!==null
        ));
    };
    document.addEventListener("input", evt => {
      const t = evt.target;
      if (t.isContentEditable) {
        gv.saveDraft();
        gv.updateStorageBtn();
        if (t.id === "Betreff")    gv.setTitleFromSubject();
        if (t.classList.contains("sidebar-text")) gv.updateAbsender();
      }
    });
    document.addEventListener("click", evt => {
      if (evt.target.matches(".clear-storage-btn")) {
        evt.preventDefault();
        if (confirm("Der Entwurf wird endgültig gelöscht. Bist du dir sicher?")) {
          gv.deleteDraft();
          gv.updateStorageBtn();
          location.reload();
        }
      }
    });
    document.addEventListener("DOMContentLoaded", () => {
      if (!gv.restoreDraft()) {
        document.getElementById("Datum").textContent = gv.createDateGerman();
      }
      gv.updateStorageBtn();
      gv.setTitleFromSubject();
    });
  })();
  </script>
