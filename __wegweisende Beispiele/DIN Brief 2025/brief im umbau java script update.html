 <script>
const editorEle = document.getElementById('Inhalt');

// Handle the `paste` event
editorEle.addEventListener('paste', function(e) {
 // Prevent the default action
 e.preventDefault();

 // Get the copied text from the clipboard
 const text = (e.clipboardData)
 ? (e.originalEvent || e).clipboardData.getData('text/plain')
 // For IE
 : (window.clipboardData ? window.clipboardData.getData('Text') : '');

 if (document.queryCommandSupported('insertText')) {
 document.execCommand('insertText', false, text);
 } else {
 // Insert text at the current position of caret
 const range = document.getSelection().getRangeAt(0);
 range.deleteContents();

 const textNode = document.createTextNode(text);
 range.insertNode(textNode);
 range.selectNodeContents(textNode);
 range.collapse(false);

 const selection = window.getSelection();
 selection.removeAllRanges();
 selection.addRange(range);
 }
});
</script>

<script>
"use strict";

;(function() {
  // --- Modul-Namespace gv ---
  const gv = window.gv = window.gv || {};

  // 1) Datenfelder, die im LocalStorage liegen
  const dataItems = [
    "address-overline","address","sidebar-text",
    "body-subject","body-text","attachments-bd"
  ];

  // 2) Datum auf Deutsch
  gv.createDateGerman = () => {
    return new Intl.DateTimeFormat("de-DE", {
      day:   "numeric",
      month: "long",
      year:  "numeric"
    }).format(new Date());
  };

  // 3) String-Kürzer (ohne Prototyp-Patch)
  function truncate(str, maxLen, useWordBoundary = true) {
    if (str.length <= maxLen) return str;
    let s = str.slice(0, maxLen - 1);
    if (useWordBoundary) {
      const idx = s.lastIndexOf(" ");
      if (idx > 0) s = s.slice(0, idx);
    }
    return s;
  }

  // 4) Titel setzen aus #Betreff
  gv.setTitleFromSubject = () => {
    const subj = document.getElementById("Betreff");
    if (!subj) return;
    const datePart = new Date().toISOString().slice(0,10); // YYYY-MM-DD
    document.title = `${datePart} ${truncate(subj.textContent, 60)}`;
  };

  // 5) Absenderzeile updaten
  gv.updateAbsender = () => {
    const getText = id => document.getElementById(id)?.textContent || "";
    const [vorname, nachname] = getText("Name").split(" ");
    const initiale = vorname?.[0]?.toUpperCase() + ".";
    const fam    = nachname ? nachname[0].toUpperCase() + nachname.slice(1) + "," : "";
    const street = getText("Straße").replace(/Strasse/i, "Straße");
    const place  = getText("Ort").replace(/Sankt/i, "St.");
    const fertig = [initiale, fam, street, place].filter(Boolean).join(" ");
    document.getElementById("ruecksende").textContent = fertig;
    document.getElementById("yourname").textContent = getText("Name");
  };

  // 6) Draft-Storage (get, save, restore, delete)
  gv.getDraft =    () => JSON.parse(localStorage.getItem("draft") || "null");
  gv.saveDraft =   () => {
    const draft = {};
    dataItems.forEach(key => {
      const el = document.querySelector(`.${key}`);
      if (el) draft[key] = el.innerHTML;
    });
    localStorage.setItem("draft", JSON.stringify(draft));
  };
  gv.restoreDraft = () => {
    const d = gv.getDraft();
    if (!d) return false;
    dataItems.forEach(key => {
      const el = document.querySelector(`.${key}`);
      if (el && d[key]!=null) el.innerHTML = d[key];
    });
    return true;
  };
  gv.deleteDraft = () => localStorage.removeItem("draft");

  // 7) Sichtbarkeit des "Löschen"-Buttons
  gv.updateStorageBtn = () => {
    document.querySelectorAll(".clear-storage-btn").forEach(btn => {
      btn.classList.toggle("is-visible", gv.getDraft() !== null);
    });
  };

// 8) Einziger Event-Delegation-Listener, aktualisiert nur bei #Betreff bzw. .sidebar-text
document.addEventListener("input", evt => {
  const t = evt.target;
  if (t.isContentEditable) {
    gv.saveDraft();
    gv.updateStorageBtn();

    // Nur wenn wirklich im Betreff-Feld getippt wird:
    if (t.id === "Betreff") {
      gv.setTitleFromSubject();
    }
    // Nur bei Änderungen im Sidebar-Text:
    if (t.classList.contains("sidebar-text")) {
      gv.updateAbsender();
    }
  }
});

  // 9) Klick auf "Löschen"
  document.addEventListener("click", evt => {
    if (evt.target.matches(".clear-storage-btn")) {
      evt.preventDefault();
      if (confirm("Der Entwurf wird endgültig gelöscht. Bist du dir sicher?")) {
        gv.deleteDraft();
        gv.updateStorageBtn();
        location.reload();
      }
    }
  });

  // 10) Initialisierung bei DOM ready
  document.addEventListener("DOMContentLoaded", () => {
    if (!gv.restoreDraft()) {
      document.getElementById("Datum").textContent = gv.createDateGerman();
    }
    gv.updateStorageBtn();
    gv.setTitleFromSubject();
  });

})();  
</script>
