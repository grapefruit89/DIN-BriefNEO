<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIN-BriefNEO | Pure & Flat Edition</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <input type="radio" name="layout-state" id="state-layout-a" hidden />
    <input
      type="radio"
      name="layout-state"
      id="state-layout-b"
      checked
      hidden
    />

    <div id="app-shell">
      <aside id="sidebar-left">
        <header class="sidebar-header">
          <div class="sidebar-brand">
            DIN-BriefNEO
            <span id="app-version" class="v-tag" title="Dev-Mode">V18.3</span>
          </div>
        </header>

        <div id="sidebar-scroll-area">
          <section class="sidebar-section">
            <div class="sidebar-control-group">
              <label class="sidebar-label">DIN-Variante</label>
              <div class="segmented-control">
                <label class="segment-option" for="state-layout-a"
                  ><span>Form A</span></label
                >
                <label class="segment-option" for="state-layout-b"
                  ><span>Form B</span></label
                >
              </div>
            </div>
            <div class="sidebar-control-group">
              <label class="sidebar-label">Arbeitsmodus</label>
              <div class="segmented-control">
                <label class="segment-option"
                  ><input
                    type="radio"
                    name="theme"
                    id="theme-day"
                    value="day"
                    checked
                  /><span>☀️ Tag</span></label
                >
                <label class="segment-option"
                  ><input
                    type="radio"
                    name="theme"
                    id="theme-night"
                    value="night"
                  /><span>🌙 Nacht</span></label
                >
              </div>
            </div>

            <div class="sidebar-control-group">
              <label class="sidebar-label">Formatierung</label>
              <div class="format-toolbar">
                <button
                  class="util-btn"
                  command="--format-bold"
                  title="Fett (Strg+B)"
                >
                  <strong>F</strong>
                </button>
                <button
                  class="util-btn"
                  command="--format-underline"
                  title="Unterstrichen (Strg+U)"
                >
                  <u>U</u>
                </button>
                <button class="util-btn" command="--format-quote" title="Zitat">
                  ❝
                </button>
              </div>
            </div>
          </section>
        </div>

        <div class="actions-footer">
          <button class="sidebar-btn primary" command="--print">
            🖨 Drucken / PDF
          </button>
          <div class="utility-actions">
            <button class="util-btn" command="--export">📥 Export</button>
            <button
              class="util-btn danger"
              onclick="
                localStorage.clear();
                location.reload();
              "
            >
              🗑️ Reset
            </button>
          </div>
        </div>
      </aside>

      <main id="paper-viewport">
        <din-5008 id="paper">
          <din-A4>
            <din-branding-logo></din-branding-logo>

            <div class="mark mark-fold-1"></div>
            <div class="mark mark-loch"></div>
            <div class="mark mark-fold-2"></div>

            <!-- Identität (Absender) -->
            <din-absender>
              <din-absender-vorname contenteditable="plaintext-only" style="--p: 'Vorname'"></din-absender-vorname>
              <din-absender-nachname contenteditable="plaintext-only" style="--p: 'Nachname'"></din-absender-nachname>
              <din-absender-strasse contenteditable="plaintext-only" style="--p: 'Straße Nr.'"></din-absender-strasse>
              <din-absender-ort contenteditable="plaintext-only" style="--p: 'PLZ Ort'"></din-absender-ort>
              <din-absender-zusatz contenteditable="plaintext-only" style="--p: 'Zusatz/Abteilung'"></din-absender-zusatz>
              <din-absender-mail contenteditable="plaintext-only" style="--p: 'E-Mail'"></din-absender-mail>
              <din-absender-tel contenteditable="plaintext-only" style="--p: 'Telefon'"></din-absender-tel>
            </din-absender>

            <!-- Anschriftfeld -->
            <din-anschriftfeld>
              <din-rucksendezeile contenteditable="plaintext-only" style="--p: 'Rücksendezeile'"></din-rucksendezeile>
              <din-zusaetze contenteditable="plaintext-only" style="--p: 'Zusatz (z.B. Einschreiben)'"></din-zusaetze>
              <din-empfaenger-firma contenteditable="plaintext-only" style="--p: 'Firma'"></din-empfaenger-firma>
              <din-empfaenger-abteilung contenteditable="plaintext-only" style="--p: 'Abteilung'"></din-empfaenger-abteilung>
              <din-empfaenger-vorname contenteditable="plaintext-only" style="--p: 'Vorname'"></din-empfaenger-vorname>
              <din-empfaenger-nachname contenteditable="plaintext-only" style="--p: 'Nachname'"></din-empfaenger-nachname>
              <din-empfaenger-strasse contenteditable="plaintext-only" style="--p: 'Straße Nr.'"></din-empfaenger-strasse>
              <din-empfaenger-ort contenteditable="plaintext-only" style="--p: 'PLZ Ort'"></din-empfaenger-ort>
            </din-anschriftfeld>

            <!-- Infoblock & Datum -->
            <din-infoblock>
              <din-ihr-zeichen contenteditable="plaintext-only" style="--p: 'Ihr Zeichen'"></din-ihr-zeichen>
              <din-ihr-schreiben contenteditable="plaintext-only" style="--p: 'Ihr Schreiben vom'"></din-ihr-schreiben>
              <din-unser-zeichen contenteditable="plaintext-only" style="--p: 'Unser Zeichen'"></din-unser-zeichen>
              <din-unser-schreiben contenteditable="plaintext-only" style="--p: 'Unser Schreiben vom'"></din-unser-schreiben>
              <din-durchwahl contenteditable="plaintext-only" style="--p: 'Durchwahl'"></din-durchwahl>
              <din-email-direkt contenteditable="plaintext-only" style="--p: 'E-Mail'"></din-email-direkt>
              <din-internet contenteditable="plaintext-only" style="--p: 'Internet'"></din-internet>
            </din-infoblock>

            <din-datum contenteditable="plaintext-only" style="--p: 'Datum'"></din-datum>

            <!-- Briefkern -->
            <din-kern>
              <din-betreff contenteditable="plaintext-only" style="--p: 'Betreff'"></din-betreff>
              <din-anrede contenteditable="plaintext-only" style="--p: 'Anrede'"></din-anrede>
              <din-text-container>
                <din-text contenteditable="plaintext-only" style="--p: 'Text schreiben...'"></din-text>
                <din-text-spiegel aria-hidden="true"></din-text-spiegel>
              </din-text-container>
              <din-grussformel contenteditable="plaintext-only" style="--p: 'Grußformel'"></din-grussformel>
              <din-unterschrift contenteditable="plaintext-only" style="--p: 'Unterschrift-Name'"></din-unterschrift>
              <din-anlagen contenteditable="plaintext-only" style="--p: 'Anlagen'"></din-anlagen>
            </din-kern>

            <!-- Fußzeile -->
            <din-fuss>
              <din-fuss-firma
                contenteditable="plaintext-only"
                style="--p: 'Firmenname'"
              ></din-fuss-firma>
              <din-fuss-sitz
                contenteditable="plaintext-only"
                style="--p: 'Firmensitz'"
              ></din-fuss-sitz>
              <din-fuss-gericht
                contenteditable="plaintext-only"
                style="--p: 'Registergericht'"
              ></din-fuss-gericht>
              <din-fuss-hrb
                contenteditable="plaintext-only"
                style="--p: 'HRB-Nummer'"
              ></din-fuss-hrb>
              <din-fuss-vorstand
                contenteditable="plaintext-only"
                style="--p: 'Vorstand'"
              ></din-fuss-vorstand>
              <din-fuss-gf
                contenteditable="plaintext-only"
                style="--p: 'Geschäftsführung'"
              ></din-fuss-gf>
              <din-fuss-stnr
                contenteditable="plaintext-only"
                style="--p: 'Steuernummer'"
              ></din-fuss-stnr>
              <din-fuss-ustid
                contenteditable="plaintext-only"
                style="--p: 'USt-IdNr.'"
              ></din-fuss-ustid>
              <din-fuss-bank
                contenteditable="plaintext-only"
                style="--p: 'Bank'"
              ></din-fuss-bank>
              <din-fuss-iban
                contenteditable="plaintext-only"
                style="--p: 'IBAN'"
              ></din-fuss-iban>
              <din-fuss-bic
                contenteditable="plaintext-only"
                style="--p: 'BIC'"
              ></din-fuss-bic>
              <din-fuss-anschrift
                contenteditable="plaintext-only"
                style="--p: 'Hausanschrift'"
              ></din-fuss-anschrift>
            </din-fuss>
          </din-A4>
        </din-5008>
      </main>
    </div>

    <div id="toast-v4" popover="manual" class="toast-container"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
