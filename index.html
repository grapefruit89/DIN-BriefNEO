<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIN-BriefNEO | Pure & Flat Edition</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <input type="radio" name="layout-state" id="state-layout-a" hidden />
    <input type="radio" name="layout-state" id="state-layout-b" checked hidden />

    <div id="app-shell">
      <aside id="sidebar-left">
        <header class="sidebar-header">
          <div class="sidebar-brand">
            DIN-BriefNEO
            <span id="app-version" class="v-tag" title="Dev-Mode">V18.3</span>
          </div>
        </header>

        <div id="sidebar-scroll-area">
          <section class="sidebar-section">
            <div class="sidebar-control-group">
              <label class="sidebar-label">DIN-Variante</label>
              <div class="segmented-control">
                <label class="segment-option" for="state-layout-a"><span>Form A</span></label>
                <label class="segment-option" for="state-layout-b"><span>Form B</span></label>
              </div>
            </div>
            <div class="sidebar-control-group">
              <label class="sidebar-label">Arbeitsmodus</label>
              <div class="segmented-control">
                <label class="segment-option"><input type="radio" name="theme" id="theme-day" value="day" checked /><span>☀️ Tag</span></label>
                <label class="segment-option"><input type="radio" name="theme" id="theme-night" value="night" /><span>🌙 Nacht</span></label>
              </div>
            </div>

            <div class="sidebar-control-group">
              <label class="sidebar-label">Formatierung</label>
              <div class="format-toolbar">
                <button class="util-btn" command="--format-bold" title="Fett (Strg+B)"><strong>F</strong></button>
                <button class="util-btn" command="--format-underline" title="Unterstrichen (Strg+U)"><u>U</u></button>
                <button class="util-btn" command="--format-quote" title="Zitat">❝</button>
              </div>
            </div>
          </section>
        </div>

        <div class="actions-footer">
          <button class="sidebar-btn primary" command="--print">🖨 Drucken / PDF</button>
          <div class="utility-actions">
            <button class="util-btn" command="--export">📥 Export</button>
            <button class="util-btn danger" onclick="localStorage.clear();location.reload();">🗑️ Reset</button>
          </div>
        </div>
      </aside>

      <main id="paper-viewport">
        <din-5008 id="paper">
          <din-A4>
            <din-branding-logo></din-branding-logo>
            
            <div class="mark mark-fold-1"></div>
            <div class="mark mark-loch"></div>
            <div class="mark mark-fold-2"></div>

            <!-- Identität (Absender) -->
            <din-header style="--x: 125mm; --y-b: 20mm; --w: 75mm">
              <din-absender-vorname contenteditable="plaintext-only" data-placeholder="Vorname"></din-absender-vorname>
              <din-absender-nachname contenteditable="plaintext-only" data-placeholder="Nachname"></din-absender-nachname>
              <din-absender-strasse contenteditable="plaintext-only" data-placeholder="Straße Nr."></din-absender-strasse>
              <din-absender-ort contenteditable="plaintext-only" data-placeholder="PLZ Ort"></din-absender-ort>
              <din-absender-kontakt contenteditable="plaintext-only" data-placeholder="Zusatz/Abteilung"></din-absender-kontakt>
              <din-absender-mail contenteditable="plaintext-only" data-placeholder="E-Mail"></din-absender-mail>
              <din-absender-tel contenteditable="plaintext-only" data-placeholder="Telefon"></din-absender-tel>
            </din-header>

            <!-- Anschriftfeld -->
            <din-anschriftfeld style="--x: 20mm; --w: 85mm; --h: 45mm">
              <din-return-line contenteditable="plaintext-only" data-placeholder="Rücksendezeile"></din-return-line>
              <din-supplement contenteditable="plaintext-only" data-placeholder="Zusatz (z.B. Einschreiben)"></din-supplement>
              <din-empfaenger-firma contenteditable="plaintext-only" data-placeholder="Firma"></din-empfaenger-firma>
              <din-empfaenger-abteilung contenteditable="plaintext-only" data-placeholder="Abteilung"></din-empfaenger-abteilung>
              <din-empfaenger-vorname contenteditable="plaintext-only" data-placeholder="Vorname"></din-empfaenger-vorname>
              <din-empfaenger-nachname contenteditable="plaintext-only" data-placeholder="Nachname"></din-empfaenger-nachname>
              <din-empfaenger-strasse contenteditable="plaintext-only" data-placeholder="Straße Nr."></din-empfaenger-strasse>
              <din-empfaenger-ort contenteditable="plaintext-only" data-placeholder="PLZ Ort"></din-empfaenger-ort>
            </din-anschriftfeld>

            <!-- Infoblock & Datum -->
            <din-infoblock style="--x: 125mm; --y-b: 97.4mm; --w: 75mm">
              <din-ref-ihr-zeichen contenteditable="plaintext-only" data-placeholder="Ihr Zeichen"></din-ref-ihr-zeichen>
              <din-ref-ihr-schreiben contenteditable="plaintext-only" data-placeholder="Ihr Schreiben vom"></din-ref-ihr-schreiben>
              <din-ref-unser-zeichen contenteditable="plaintext-only" data-placeholder="Unser Zeichen"></din-ref-unser-zeichen>
              <din-ref-unser-schreiben contenteditable="plaintext-only" data-placeholder="Unser Schreiben vom"></din-ref-unser-schreiben>
              <din-ref-telefon contenteditable="plaintext-only" data-placeholder="Telefon"></din-ref-telefon>
              <din-ref-email contenteditable="plaintext-only" data-placeholder="E-Mail"></din-ref-email>
              <din-ref-internet contenteditable="plaintext-only" data-placeholder="Internet"></din-ref-internet>
            </din-infoblock>

            <din-date contenteditable="plaintext-only" data-placeholder="Datum" style="--x: 125mm; --y-b: 45mm; --w: 75mm"></din-date>

            <!-- Briefkern -->
            <din-kern style="--x: 25mm; --y-b: 103.4mm; --w: 165mm">
              <din-subject contenteditable="plaintext-only" data-placeholder="Betreff"></din-subject>
              <din-anrede contenteditable="plaintext-only" data-placeholder="Anrede"></din-anrede>
              <din-text-container>
                <din-text contenteditable="plaintext-only" data-placeholder="Text schreiben..."></din-text>
                <din-text-mirror aria-hidden="true"></din-text-mirror>
              </din-text-container>
              <din-grussformel contenteditable="plaintext-only" data-placeholder="Grußformel"></din-grussformel>
              <din-signature contenteditable="plaintext-only" data-placeholder="Unterschrift-Name"></din-signature>
              <din-attachments contenteditable="plaintext-only" data-placeholder="Anlagen"></din-attachments>
            </din-kern>

            <!-- Fußzeile -->
            <din-fusszeile style="--x: 25mm; --w: 165mm">
              <din-footer-bank-name contenteditable="plaintext-only" data-placeholder="Bank"></din-footer-bank-name>
              <din-footer-iban contenteditable="plaintext-only" data-placeholder="IBAN"></din-footer-iban>
              <din-footer-bic contenteditable="plaintext-only" data-placeholder="BIC"></din-footer-bic>
              <din-footer-anschrift contenteditable="plaintext-only" data-placeholder="Hausanschrift"></din-footer-anschrift>
            </din-fusszeile>
          </din-A4>
        </din-5008>
      </main>
    </div>

    <div id="toast-v4" popover="manual" class="toast-container"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
